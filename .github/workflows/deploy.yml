name: Deploy Quartz Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-blog
  cancel-in-progress: true

env:
  CDN_BASE_URL: https://cdn.shaeray.com
  BUILD_CONTENT_DIR: /tmp/quartz-cdn-content
  CDN_UPLOAD_DIR: .quartz-cdn-upload

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check project
        run: npm run check

      - name: Prepare CDN content
        run: npm run prepare:cdn

      - name: Checkout CDN repository
        uses: actions/checkout@v4
        with:
          repository: ShaeRay/cdn
          token: ${{ secrets.CDN_REPO_TOKEN }}
          path: cdn-repo

      - name: Sync images to CDN repository
        run: rsync -av "$CDN_UPLOAD_DIR"/ cdn-repo/

      - name: Commit CDN assets
        working-directory: cdn-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync blog assets"
            git push
          else
            echo "No CDN asset changes."
          fi

      - name: Build Quartz site
        run: npx quartz build -d "$BUILD_CONTENT_DIR"

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Deploy public directory
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          SERVER_PORT="${SERVER_PORT:-22}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $SERVER_PORT" \
            public/ "$SERVER_USER@$SERVER_HOST:${SERVER_PATH%/}/"
